<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SkyRadar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#030a03">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SkyRadar">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{--g:#00ff46;--gb:rgba(0,255,70,.7);--gf:rgba(0,255,70,.13);--bg:#030a03;--f:'Courier New','Lucida Console',monospace;}
    html,body{height:100%;background:var(--bg);color:var(--g);font-family:var(--f);overflow:hidden;}
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:200;font-size:11px;letter-spacing:4px;}
    #loading.hidden{display:none;}
    .spinner{width:44px;height:44px;border:2px solid rgba(0,255,70,.15);border-top-color:var(--g);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
    #header{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid var(--gf);flex-shrink:0;font-size:11px;letter-spacing:2px;gap:8px;}
    .hlogo{font-size:12px;font-weight:bold;display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .hver{font-size:9px;opacity:.4;letter-spacing:2px;}
    #hclock{opacity:.55;font-size:11px;flex-shrink:0;}
    #audiobtn{background:none;border:1px solid var(--gf);color:var(--g);font-size:14px;cursor:pointer;width:28px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;line-height:1;}
    #hcount{opacity:.65;font-size:10px;flex-shrink:0;}
    #radar-wrap{display:flex;justify-content:center;align-items:center;flex-shrink:0;padding:6px 8px 3px;}
    #rc{cursor:crosshair;touch-action:none;display:block;border-radius:50%;}
    #panel{flex:1;overflow-y:auto;overflow-x:hidden;}
    #panel::-webkit-scrollbar{width:3px;}
    #panel::-webkit-scrollbar-thumb{background:var(--gf);}
    .no-sig{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:.3;font-size:11px;letter-spacing:4px;gap:14px;text-align:center;padding:20px;}
    #finfo{padding:4px 12px 12px;}
    .nav-hint{text-align:center;font-size:9px;opacity:.35;letter-spacing:3px;margin-bottom:8px;padding-top:2px;}
    .sil-wrap{display:flex;justify-content:center;align-items:center;margin:2px 0 6px;}
    .cs{font-size:clamp(28px,8vw,44px);font-weight:bold;letter-spacing:5px;text-align:center;text-shadow:0 0 18px var(--g),0 0 40px rgba(0,255,70,.3);line-height:1.1;}
    .aname{text-align:center;font-size:12px;font-weight:bold;opacity:.75;letter-spacing:3px;margin-top:3px;}
    .atype{text-align:center;font-size:13px;font-weight:bold;color:var(--g);letter-spacing:2px;margin-top:3px;margin-bottom:10px;}
    .route{display:flex;align-items:stretch;gap:6px;border:1px solid var(--gf);padding:10px 10px;margin-bottom:8px;background:rgba(0,255,70,.025);}
    .ap{flex:1;}
    .ap-flag{font-size:18px;line-height:1;margin-bottom:3px;}
    .ap-code{font-size:clamp(18px,5.5vw,26px);font-weight:bold;letter-spacing:3px;line-height:1;}
    .ap-city{font-size:10px;font-weight:bold;opacity:.7;letter-spacing:1px;margin-top:2px;}
    .ap-time{font-size:11px;font-weight:bold;color:var(--g);opacity:.85;margin-top:3px;letter-spacing:1px;}
    .ap-lbl{font-size:8px;opacity:.35;letter-spacing:3px;margin-top:3px;}
    .rarr{font-size:20px;opacity:.3;display:flex;align-items:center;}
    .sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:7px;}
    .sbox{border:1px solid var(--gf);padding:8px 5px;text-align:center;background:rgba(0,255,70,.02);}
    .sv{font-size:clamp(14px,4.5vw,20px);font-weight:bold;line-height:1.1;}
    .sl{font-size:8px;font-weight:bold;opacity:.4;letter-spacing:2px;margin-top:4px;}
    .pbar{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--gf);padding-top:7px;font-size:9px;font-weight:bold;opacity:.5;letter-spacing:2px;flex-wrap:wrap;gap:4px;}
    #settings{display:flex;align-items:center;gap:10px;padding:6px 12px;border-top:1px solid var(--gf);flex-shrink:0;font-size:10px;letter-spacing:2px;}
    #settings label{opacity:.4;flex-shrink:0;font-weight:bold;}
    #rslider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:var(--gf);outline:none;cursor:pointer;}
    #rslider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--g);cursor:pointer;box-shadow:0 0 6px var(--g);}
    #rval{min-width:44px;text-align:right;opacity:.7;flex-shrink:0;font-weight:bold;}
  </style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div>ACQUISIZIONE SEGNALE GPS...</div>
  <div style="font-size:9px;opacity:.3;letter-spacing:3px">SKYRADAR v2.0</div>
</div>

function haversine(la1,lo1,la2,lo2){
  const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearingTo(la1,lo1,la2,lo2){
  const dLo=(lo2-lo1)*Math.PI/180;
  const y=Math.sin(dLo)*Math.cos(la2*Math.PI/180);
  const x=Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)-Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos(dLo);
  return(Math.atan2(y,x)*180/Math.PI+360)%360;
}
function hdgLabel(d){return["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSO","SO","OSO","O","ONO","NO","NNO"][Math.round(d/22.5)%16];}

function flag(co){
  if(!co)return'';
  return co.toUpperCase().split('').map(c=>String.fromCodePoint(c.charCodeAt(0)-65+0x1F1E6)).join('');
}
function apInfo(icao){
  if(!icao||icao==='—'||icao.length<3)return null;
  const code=icao.toUpperCase().substring(0,4);
  const r=AP[code];
  if(r)return{code,city:r.c,flag:flag(r.co)};
  // fallback IATA-like (3 lettere)
  return{code,city:'',flag:''};
}

  if(own&&own.trim()&&own!=='N/A')return own.trim();
  if(!cs)return'—';
  const c=cs.trim();
  return AL[c.substring(0,3).toUpperCase()]||AL[c.substring(0,2).toUpperCase()]||'—';
}

// ─── AIRCRAFT CATEGORY ────────────────────
function acCat(t){
  if(!t)return'nb';
  const u=t.toUpperCase();
  if(/^(EC\d|B06|R44|AS3|H6[02]|S76|S92|NH9|R22|AW1|MD9\d|BK1|EC2|EC3|H13)/.test(u))return'heli';
  if(/^A38/.test(u))return'a380';
  if(/^(B74|B748)/.test(u))return'b747';
  if(/^(A33|A34|A35|A36|B76|B77|B78|B79|DC10|MD11|A30[BF])/.test(u))return'wb';
  if(/^(E17|E19|E29|CRJ|CRX|E70|E75|E90|E95|AT[457]|AT6|DH8|SF3|B73[^7-9])/.test(u))return'rj';
  if(/^(GL|LJ|PC12|CJ[0-9]|C25|C56|C55|BE4|CL6|E50|DA4|DA5|SR2|F2T|HA4|PRM|C68|GLF)/.test(u))return'biz';
  if(/^(C17|C13|A400|B52|C5|P3|P8|C27|IL7|IL8|AN7|C160|KC|RC|E3|E8)/.test(u))return'mil';
  return'nb';
}

function getSil(t){
  const map={heli:'heli',a380:'a380',b747:'b747',wb:'wb',rj:'rj',biz:'biz',mil:'mil',nb:'nb'};
  const key=map[acCat(t)]||'nb';

// ─── AUDIO ────────────────────────────────
let audioCtx=null,audioOn=false,beepTimer=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function beep(){
  if(!audioCtx||!audioOn)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.frequency.value=920;o.type='sine';
  g.gain.setValueAtTime(0,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.22,audioCtx.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.09);
  o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.1);
}
function scheduleBeep(){
  if(!audioOn)return;
  beep();
  let interval=4000;
  if(S.ac.length>0&&S.lat!==null){
    const d=haversine(S.lat,S.lon,S.ac[0].lat||S.lat,S.ac[0].lon||S.lon);
    const t=Math.max(0,Math.min(1,(d-3)/(S.radius-3)));
    interval=280+t*3720;
  }
  beepTimer=setTimeout(scheduleBeep,interval);
}
function toggleAudio(){
  initAudio();
  audioOn=!audioOn;
  document.getElementById('audiobtn').textContent=audioOn?'🔊':'🔇';
  if(audioOn)scheduleBeep();
  else clearTimeout(beepTimer);
}

// ─── CANVAS ───────────────────────────────
const canvas=document.getElementById('rc');
const ctx=canvas.getContext('2d');
let rafId=null,CX,CY,RPX,SIZE_CSS;

function setupCanvas(){
  const wrap=document.getElementById('radar-wrap');
  const avW=wrap.clientWidth-16;
  const avH=Math.floor(window.innerHeight*0.44);
  SIZE_CSS=Math.min(avW,avH,420);
  S.dpr=window.devicePixelRatio||1;
  canvas.width=Math.round(SIZE_CSS*S.dpr);
  canvas.height=Math.round(SIZE_CSS*S.dpr);
  canvas.style.width=SIZE_CSS+'px';
  canvas.style.height=SIZE_CSS+'px';
  ctx.scale(S.dpr,S.dpr);
  CX=SIZE_CSS/2;CY=SIZE_CSS/2;RPX=SIZE_CSS/2-8;
}

function drawRadar(){
  const SZ=SIZE_CSS;
  ctx.clearRect(0,0,SZ,SZ);
  const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,RPX);
  bg.addColorStop(0,'#0f220f');bg.addColorStop(0.65,'#081408');bg.addColorStop(1,'#030a03');
  ctx.beginPath();ctx.arc(CX,CY,RPX,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();

  [.25,.5,.75,1].forEach((f,i)=>{
    ctx.beginPath();ctx.arc(CX,CY,RPX*f,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,255,70,${i===3?.3:.1})`;ctx.lineWidth=i===3?1.5:1;ctx.stroke();
    if(i<3){
      const d=Math.round(S.radius*f),fs=Math.max(8,SZ/46);
      const ang=-Math.PI/4;
      ctx.fillStyle='rgba(0,255,70,.32)';ctx.font=`bold ${fs}px 'Courier New'`;ctx.textAlign='left';
      ctx.fillText(d+'km',CX+RPX*f*Math.cos(ang)+1,CY+RPX*f*Math.sin(ang)-2);
    }
  });

  ctx.strokeStyle='rgba(0,255,70,.09)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(CX,CY-RPX);ctx.lineTo(CX,CY+RPX);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX-RPX,CY);ctx.lineTo(CX+RPX,CY);ctx.stroke();
  const fc=Math.max(10,SZ/32);
  ctx.fillStyle='rgba(0,255,70,.5)';ctx.font=`bold ${fc}px 'Courier New'`;
  ctx.textAlign='center';
  ctx.fillText('N',CX,CY-RPX+fc+1);ctx.fillText('S',CX,CY+RPX-3);
  ctx.textAlign='left';ctx.fillText('E',CX+RPX-fc-2,CY+5);ctx.fillText('O',CX-RPX+4,CY+5);

  // sweep
  ctx.save();ctx.translate(CX,CY);ctx.rotate(S.sweep);
  for(let i=9;i>=0;i--){
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,RPX,0,-0.55*i/9,false);ctx.closePath();
    ctx.fillStyle=`rgba(0,255,70,${0.0038*(9-i)})`;ctx.fill();
  }
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(RPX,0);
  ctx.strokeStyle='rgba(0,255,70,.9)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(RPX,0,3,0,Math.PI*2);ctx.fillStyle='#00ff46';ctx.fill();
  ctx.restore();
  S.sweep+=0.02;

  // blips
  S.blips=[];
  if(S.lat!==null){
    S.ac.forEach((ac,idx)=>{
      if(!ac.lat||!ac.lon)return;
      const dist=haversine(S.lat,S.lon,ac.lat,ac.lon);
      if(dist>S.radius)return;
      const bear=bearingTo(S.lat,S.lon,ac.lat,ac.lon);
      const scale=(dist/S.radius)*(RPX-12);
      const bx=CX+Math.sin(bear*Math.PI/180)*scale;
      const by=CY-Math.cos(bear*Math.PI/180)*scale;
      const sel=idx===S.selIdx;

      if(sel){
        for(const r of[16,10]){
          ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
          ctx.strokeStyle=`rgba(0,255,70,${r===16?.1:.28})`;ctx.lineWidth=1;ctx.stroke();
        }
      }
      const bR=sel?7:4.5;
      ctx.beginPath();ctx.arc(bx,by,bR,0,Math.PI*2);
      ctx.fillStyle=sel?'#00ff46':'rgba(0,255,70,.65)';
      if(sel){ctx.shadowColor='#00ff46';ctx.shadowBlur=10;}
      ctx.fill();ctx.shadowBlur=0;

      if(ac.track!=null){
        const aLen=sel?16:10,aRad=ac.track*Math.PI/180;
        const ax=bx+Math.sin(aRad)*aLen,ay=by-Math.cos(aRad)*aLen;
        ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(ax,ay);
        ctx.strokeStyle=sel?'rgba(0,255,70,.95)':'rgba(0,255,70,.4)';
        ctx.lineWidth=sel?1.8:1.1;ctx.stroke();
        const p=5,pa=0.44;
        ctx.beginPath();ctx.moveTo(ax,ay);
        ctx.lineTo(ax-Math.sin(aRad-pa)*p,ay+Math.cos(aRad-pa)*p);
        ctx.lineTo(ax-Math.sin(aRad+pa)*p,ay+Math.cos(aRad+pa)*p);
        ctx.closePath();ctx.fillStyle=sel?'rgba(0,255,70,.95)':'rgba(0,255,70,.4)';ctx.fill();
      }
      const fn=Math.max(9,SZ/40);
      ctx.fillStyle=sel?'#00ff46':'rgba(0,255,70,.8)';
      ctx.font=`bold ${fn}px 'Courier New'`;ctx.textAlign='left';
      ctx.fillText(idx+1,bx+bR+2,by-bR);
      S.blips.push({x:bx,y:by,idx});
    });
  }

  // centro
  ctx.beginPath();ctx.arc(CX,CY,4.5,0,Math.PI*2);
  ctx.fillStyle='#00ff46';ctx.shadowColor='#00ff46';ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(CX,CY,11,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,255,70,.3)';ctx.lineWidth=1;ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,.9)';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(CX-3.5,CY);ctx.lineTo(CX+3.5,CY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX,CY-3.5);ctx.lineTo(CX,CY+3.5);ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,RPX,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,255,70,.32)';ctx.lineWidth=2;ctx.stroke();

  rafId=requestAnimationFrame(drawRadar);
}

function onTap(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  let cx,cy;
  if(e.touches){cx=e.touches[0].clientX-rect.left;cy=e.touches[0].clientY-rect.top;}
  else{cx=e.clientX-rect.left;cy=e.clientY-rect.top;}
  let best=null,bestD=32;
  S.blips.forEach(b=>{const d=Math.hypot(b.x-cx,b.y-cy);if(d<bestD){bestD=d;best=b;}});
  if(best){S.selIdx=best.idx;renderPanel(S.ac[S.selIdx]);}
}
canvas.addEventListener('click',onTap);
canvas.addEventListener('touchstart',onTap,{passive:false});

// ─── FETCH AIRCRAFT ───────────────────────
async function fetchAC(){
  if(S.lat===null)return;
  const nm=Math.max(11,Math.ceil(S.radius/1.852));
  try{
    const r=await fetch(`https://api.airplanes.live/v2/point/${S.lat}/${S.lon}/${nm}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return;
    const data=await r.json();
    let ac=(data.ac||[]).filter(a=>a.lat&&a.lon);
    ac.sort((a,b)=>haversine(S.lat,S.lon,a.lat,a.lon)-haversine(S.lat,S.lon,b.lat,b.lon));
    S.ac=ac;
    S.lastUpd=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if(S.selIdx>=ac.length)S.selIdx=0;
    document.getElementById('hcount').textContent=ac.length+' IN ZONA';
    if(ac.length===0){
      document.getElementById('nosig').style.display='';
      document.getElementById('finfo').style.display='none';
    }else{
      document.getElementById('nosig').style.display='none';
      document.getElementById('finfo').style.display='';
      renderPanel(ac[S.selIdx]);
      ac.slice(0,10).forEach(a=>{if(a.hex){fetchHex(a.hex);fetchTimes(a.hex,(a.flight||'').trim());}});
    }
  }catch(e){console.warn('fetchAC:',e.message);}
}

async function fetchHex(hex){
  if(S.hexCache[hex]!==undefined)return;
  S.hexCache[hex]=null;
  try{
    const r=await fetch(`https://hexdb.io/api/v1/aircraft/${hex}`,{signal:AbortSignal.timeout(5000)});
    if(!r.ok)return;
    const d=await r.json();
    S.hexCache[hex]={type:d.ICAOTypeCode||d.Type||null,op:d.RegisteredOwners||d.Operator||null,reg:d.Registration||null};
    if(S.ac[S.selIdx]?.hex===hex)renderPanel(S.ac[S.selIdx]);
  }catch{}
}

async function fetchTimes(hex,callsign){
  if(S.timeCache[hex]!==undefined)return;
  S.timeCache[hex]=null;
  try{
    const now=Math.floor(Date.now()/1000);
    const begin=now-18000,end=now+3600;
    const url=`https://opensky-network.org/api/flights/aircraft?icao24=${hex}&begin=${begin}&end=${end}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(6000)});
    if(!r.ok)return;
    const data=await r.json();
    if(!data||!data.length)return;
    const cs=callsign.replace(/\s/g,'').toUpperCase();
    const fl=data.find(f=>(f.callsign||'').trim().replace(/\s/g,'').toUpperCase()===cs)||data[data.length-1];
    S.timeCache[hex]={
      depTime:fl.firstSeen?fmtTs(fl.firstSeen):null,
      arrTime:fl.lastSeen&&fl.lastSeen>fl.firstSeen+1800?fmtTs(fl.lastSeen):null,
      dep:fl.estDepartureAirport||null,
      arr:fl.estArrivalAirport||null,
    };
    if(S.ac[S.selIdx]?.hex===hex)renderPanel(S.ac[S.selIdx]);
  }catch{}
}

// ─── RENDER PANEL ─────────────────────────
function renderPanel(ac){
  if(!ac)return;
  const hx=S.hexCache[ac.hex]||{};
  const tm=S.timeCache[ac.hex]||{};
  const cs=(ac.flight||'').trim()||ac.hex||'—';
  const aln=airlineName(cs,ac.ownOp||hx.op);
  const typ=(ac.t||hx.type||'').toUpperCase()||'';
  const dist=S.lat?Math.round(haversine(S.lat,S.lon,ac.lat,ac.lon)):'—';
  const altFt=ac.alt_baro??ac.alt_geom;
  const altFtS=altFt!=null?Math.round(altFt).toLocaleString('it-IT'):'—';
  const altM=altFt!=null?Math.round(altFt*0.3048):null;
  const spd=ac.gs!=null?Math.round(ac.gs*1.852):null;
  const vr=ac.baro_rate;
  const trk=ac.track!=null?Math.round(ac.track):null;
  const total=S.ac.length,num=S.selIdx+1;

  let phase='—';
  if(altFt!=null){
    if(altFt<500)phase='A TERRA';
    else if(altFt<3000)phase=vr!=null&&vr>200?'DECOLLO':(vr!=null&&vr<-200?'FINALE':'CIRCUITO');
    else if(altFt<8000)phase=vr!=null&&vr>400?'SALITA INIZIALE':(vr!=null&&vr<-400?'AVVICINAMENTO':'TRANSIZIONE');
    else if(vr!=null&&vr>500)phase='SALITA';
    else if(vr!=null&&vr<-500)phase='DISCESA';
    else phase='CROCIERA';
  }

  // origine/dest: prima da airplanes.live, poi da opensky
  const rawDep=(ac.dep||tm.dep||'').toUpperCase().replace(/[^A-Z]/g,'');
  const rawArr=(ac.arr||tm.arr||'').toUpperCase().replace(/[^A-Z]/g,'');
  const depInfo=apInfo(rawDep);
  const arrInfo=apInfo(rawArr);
  const depTime=tm.depTime||null;
  const arrTime=tm.arrTime||null;

  function apBlock(info,time,lbl,align='left'){
    if(!info)return`<div class="ap" style="text-align:${align}">
      <div class="ap-code" style="opacity:.3">—</div>
      <div class="ap-lbl">${lbl}</div></div>`;
    return`<div class="ap" style="text-align:${align}">
      ${info.flag?`<div class="ap-flag">${info.flag}</div>`:''}
      <div class="ap-code">${info.code}</div>
      ${info.city?`<div class="ap-city">${info.city}</div>`:''}
      ${time?`<div class="ap-time">${time}</div>`:''}
      <div class="ap-lbl">${lbl}</div>
    </div>`;
  }

  let sil=getSil(typ||null).replace('<svg ','<svg width="220" height="80" ');

  const vrStr=vr!=null
    ?`<span style="color:${vr>80?'#00ff46':vr<-80?'#ff6b35':'#88ff88'}">${vr>80?'↑':vr<-80?'↓':'→'}${Math.abs(Math.round(vr))}</span>`
    :'—';

  document.getElementById('finfo').innerHTML=`
    ${total>1?`<div class="nav-hint">✈ ${num}/${total} &nbsp;·&nbsp; TAP SUL RADAR PER SELEZIONARE</div>`:''}
    <div class="sil-wrap">${sil}</div>
    <div class="cs">${cs}</div>
    <div class="aname">${aln}</div>
    <div class="atype">${typ||'—'}${hx.reg?' &nbsp;·&nbsp; '+hx.reg:''}</div>
    <div class="route">
      ${apBlock(depInfo,depTime,'PARTENZA','left')}
      <div class="rarr">⟶</div>
      ${apBlock(arrInfo,arrTime,'ARRIVO','right')}
    </div>
    <div class="sgrid">
      <div class="sbox"><div class="sv">${dist}</div><div class="sl">KM DA TE</div></div>
      <div class="sbox"><div class="sv">${altFtS}</div><div class="sl">PIEDI</div></div>
      <div class="sbox"><div class="sv">${spd!=null?spd:'—'}</div><div class="sl">KM/H</div></div>
      <div class="sbox"><div class="sv">${trk!=null?trk+'°':'—'}</div><div class="sl">${trk!=null?hdgLabel(trk):'ROTTA'}</div></div>
      <div class="sbox"><div class="sv">${altM!=null?(altM/1000).toFixed(1)+'k':'—'}</div><div class="sl">METRI</div></div>
      <div class="sbox"><div class="sv">${vrStr}</div><div class="sl">FT/MIN</div></div>
    </div>
    <div class="pbar">
      <span>FASE: <strong>${phase}</strong></span>
      <span>${S.lastUpd?'⟳ '+S.lastUpd:''}</span>
    </div>
  `;
}

// ─── SETTINGS ─────────────────────────────
document.getElementById('rslider').addEventListener('input',function(){
  S.radius=parseInt(this.value);
  document.getElementById('rval').textContent=S.radius+' KM';
  fetchAC();
});

// ─── CLOCK ────────────────────────────────
setInterval(()=>{
  document.getElementById('hclock').textContent=
    new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// ─── INIT ─────────────────────────────────
function startApp(lat,lon){
  S.lat=lat;S.lon=lon;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.display='';
  setupCanvas();
  if(rafId)cancelAnimationFrame(rafId);
  drawRadar();fetchAC();
  if(S.timer)clearInterval(S.timer);
  S.timer=setInterval(fetchAC,10000);
}

navigator.geolocation.getCurrentPosition(
  p=>startApp(p.coords.latitude,p.coords.longitude),
  ()=>{
    document.getElementById('loading').innerHTML=
      '<div style="font-size:26px;color:#ff4444">⊗</div>'+
      '<div>GPS NON DISPONIBILE</div>'+
      '<div style="font-size:9px;opacity:.4;letter-spacing:2px;margin-top:10px;text-align:center;max-width:260px">Controlla i permessi di geolocalizzazione</div>';
  },
  {enableHighAccuracy:true,timeout:15000,maximumAge:30000}
);
navigator.geolocation.watchPosition(
  p=>{S.lat=p.coords.latitude;S.lon=p.coords.longitude;},
  ()=>{},{enableHighAccuracy:true}
);
window.addEventListener('resize',()=>{if(rafId)cancelAnimationFrame(rafId);setupCanvas();drawRadar();});
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
