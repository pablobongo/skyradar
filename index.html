<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SkyRadar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#030a03">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SkyRadar">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    #app{display:flex;flex-direction:column;height:100vh;height:100dvh;transition:background .4s;}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;font-size:12px;letter-spacing:4px;font-weight:bold;z-index:300;}
    #loading.hidden{display:none;}
    .spinner{width:44px;height:44px;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* HEADER */
    #header{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;flex-shrink:0;gap:5px;border-bottom-width:1px;border-bottom-style:solid;}
    .hlogo{font-size:12px;font-weight:bold;display:flex;align-items:center;gap:5px;flex-shrink:0;letter-spacing:2px;}
    .dot{width:7px;height:7px;border-radius:50%;animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
    .hver{font-size:9px;letter-spacing:2px;font-weight:bold;}
    #hclock{font-size:11px;font-weight:bold;flex-shrink:0;}
    .hbtn{background:none;font-size:10px;font-weight:bold;cursor:pointer;height:24px;padding:0 7px;letter-spacing:1px;flex-shrink:0;white-space:nowrap;border-width:1px;border-style:solid;font-family:inherit;}
    #hcount{font-size:10px;font-weight:bold;flex-shrink:0;letter-spacing:1px;}
    /* FILTER BAR */
    #filterbar{display:flex;gap:5px;padding:5px 10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;border-bottom-width:1px;border-bottom-style:solid;}
    #filterbar::-webkit-scrollbar{display:none;}
    .fbtn{font-size:9px;font-weight:bold;padding:3px 9px;border-width:1px;border-style:solid;cursor:pointer;letter-spacing:1px;white-space:nowrap;font-family:inherit;flex-shrink:0;}
    /* DISPLAY AREA */
    #display-area{display:flex;justify-content:center;align-items:center;flex-shrink:0;padding:6px 8px 3px;position:relative;}
    #rc{cursor:crosshair;touch-action:none;display:block;}
    #leaflet-map{display:none;background:#030a03;overflow:hidden;border-width:1px;border-style:solid;}
    #leaflet-map .leaflet-tile-pane{filter:grayscale(1) sepia(1) hue-rotate(80deg) saturate(5) brightness(.45) contrast(1.3);}
    #leaflet-map .leaflet-container{background:#030a03 !important;}
    #leaflet-map .leaflet-control-zoom a{background:#0a1a0a !important;border-width:1px !important;}
    #leaflet-map .leaflet-control-attribution{background:rgba(0,0,0,.7)!important;font-size:6px!important;}
    .user-map-dot{width:12px;height:12px;border-radius:50%;box-shadow:0 0 10px currentColor;border:2px solid #000;}
    .ac-map-blip{border-radius:50%;border-width:1.5px;border-style:solid;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#000;cursor:pointer;font-family:inherit;}
    .ac-map-blip.sel{box-shadow:0 0 10px currentColor;}
    /* PANEL */
    #panel{flex:1;overflow-y:auto;overflow-x:hidden;}
    #panel::-webkit-scrollbar{width:3px;}
    .no-sig{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:bold;letter-spacing:4px;gap:14px;text-align:center;padding:20px;}
    #finfo{padding:4px 12px 14px;}
    /* SETTINGS */
    #settings{display:flex;align-items:center;gap:10px;padding:6px 12px;border-top-width:1px;border-top-style:solid;flex-shrink:0;}
    #settings label{font-size:10px;font-weight:bold;letter-spacing:2px;flex-shrink:0;}
    #rslider{flex:1;-webkit-appearance:none;appearance:none;height:2px;outline:none;cursor:pointer;}
    #rslider::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;cursor:pointer;}
    #rval{min-width:48px;text-align:right;font-size:11px;font-weight:bold;flex-shrink:0;}
    /* TEMA: classi comuni panel */
    .nav-hint{text-align:center;font-size:10px;font-weight:bold;letter-spacing:3px;margin-bottom:8px;padding-top:2px;}
    .route{display:flex;align-items:stretch;margin-bottom:9px;overflow:hidden;border-width:1px;border-style:solid;}
    .ap{flex:1;min-width:0;padding:9px 8px;}
    .ap-flag img{height:14px;display:block;margin-bottom:3px;}
    .ap-code{font-size:clamp(18px,5.5vw,26px);font-weight:bold;letter-spacing:2px;line-height:1;}
    .ap-city{font-size:11px;font-weight:bold;margin-top:3px;}
    .ap-name{font-size:8px;font-weight:bold;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ap-lbl{font-size:8px;font-weight:bold;letter-spacing:3px;margin-top:4px;opacity:.6;}
    .rarr{display:flex;align-items:center;justify-content:center;padding:0 5px;font-size:20px;border-left-width:1px;border-left-style:solid;border-right-width:1px;border-right-style:solid;flex-shrink:0;}
    .sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
    .sbox{padding:8px 5px;text-align:center;border-width:1px;border-style:solid;}
    .sv{font-size:clamp(15px,4.8vw,22px);font-weight:bold;line-height:1.1;}
    .sl{font-size:9px;font-weight:bold;letter-spacing:2px;margin-top:4px;}
    .acspecs{margin-bottom:9px;border-width:1px;border-style:solid;}
    .acrow{display:grid;grid-template-columns:1fr 1fr;border-bottom-width:1px;border-bottom-style:solid;}
    .acrow:last-child{border-bottom:none;}
    .acfield{padding:7px 10px;}
    .acfield:first-child{border-right-width:1px;border-right-style:solid;}
    .acfl{font-size:8px;font-weight:bold;letter-spacing:3px;margin-bottom:4px;}
    .acfv{font-size:clamp(13px,3.8vw,16px);font-weight:bold;}
    .pbar{display:flex;justify-content:space-between;align-items:center;border-top-width:1px;border-top-style:solid;padding-top:8px;font-size:10px;font-weight:bold;letter-spacing:2px;flex-wrap:wrap;gap:4px;}
  </style>
</head>
<body>
<div id="loading">
  <div class="spinner" id="lspinner"></div>
  <div id="ltxt">ACQUISIZIONE SEGNALE GPS...</div>
  <div id="lver" style="font-size:9px;letter-spacing:3px;font-weight:bold;">SKYRADAR v2.4.4</div>
</div>
<div id="app" style="display:none">
  <div id="header">
    <div class="hlogo"><div class="dot" id="hdot"></div><span>SKYRADAR</span><span class="hver" id="hv">v2.4.4</span></div>
    <div id="hclock">--:--:--</div>
    <button class="hbtn" id="themebtn" onclick="cycleTheme()">TEMA</button>
    <button class="hbtn" id="viewbtn" onclick="toggleView()">MAPPA</button>
    <button class="hbtn" id="audiobtn" onclick="toggleAudio()">&#128263;</button>
    <div id="hcount">0 IN ZONA</div>
  </div>
  <div id="filterbar"></div>
  <div id="display-area">
    <canvas id="rc"></canvas>
    <div id="leaflet-map"></div>
  </div>
  <div id="panel">
    <div class="no-sig" id="nosig">
      <div style="font-size:28px">&#9992;</div>
      <div>NESSUN AEREO NEL RAGGIO</div>
      <div style="font-size:10px;margin-top:4px;">PROVA AD AUMENTARE IL RAGGIO</div>
    </div>
    <div id="finfo" style="display:none"></div>
  </div>
  <div id="settings">
    <label>RAGGIO</label>
    <input type="range" id="rslider" min="20" max="250" value="50" step="10">
    <span id="rval">50 KM</span>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// SKYRADAR v2.4.4

// ── TEMI ──────────────────────────────────────────────
const THEMES={
  radar:{
    id:'radar',label:'RADAR',
    g:'#00ff46',gm:'rgba(0,255,70,.75)',gf:'rgba(0,255,70,.14)',
    bg:'#030a03',col:'#00ff46',colW:'#ffffff',colD:'rgba(0,255,70,.5)',
    rb1:'#112211',rb2:'#081408',rb3:'#030a03',
    font:"'Courier New','Lucida Console',monospace"
  },
  fids:{
    id:'fids',label:'FIDS',
    g:'#f5c842',gm:'rgba(245,200,66,.65)',gf:'rgba(245,200,66,.18)',
    bg:'#0a0805',col:'#f5c842',colW:'#fff8dc',colD:'rgba(245,200,66,.5)',
    rb1:'#1a1505',rb2:'#100e03',rb3:'#0a0805',
    font:"'Courier New','Lucida Console',monospace"
  },
  hud:{
    id:'hud',label:'HUD',
    g:'#38bdf8',gm:'rgba(56,189,248,.65)',gf:'rgba(56,189,248,.14)',
    bg:'#080c18',col:'#7dd3fc',colW:'#f0f9ff',colD:'rgba(56,189,248,.45)',
    rb1:'#0f172a',rb2:'#080c18',rb3:'#05090f',
    font:"-apple-system,'SF Pro Display',sans-serif"
  }
};
const THEME_ORDER=['radar','fids','hud'];
let T=THEMES.radar; // tema attivo

function applyTheme(th){
  T=THEMES[th];
  document.body.style.background=T.bg;
  document.body.style.color=T.col;
  document.body.style.fontFamily=T.font;
  // header
  const h=document.getElementById('header');
  h.style.borderBottomColor=T.gf;
  h.style.background=T.bg;
  document.getElementById('hdot').style.background=T.g;
  document.getElementById('hv').style.color=T.gm;
  document.getElementById('hclock').style.color=T.gm;
  document.getElementById('hcount').style.color=T.g;
  // bottoni header
  ['themebtn','viewbtn','audiobtn'].forEach(id=>{
    const b=document.getElementById(id);
    b.style.color=T.g;b.style.borderColor=T.gf;b.style.background='none';b.style.fontFamily=T.font;
  });
  document.getElementById('themebtn').textContent=T.label;
  // filterbar
  document.getElementById('filterbar').style.borderBottomColor=T.gf;
  document.getElementById('filterbar').style.background=T.bg;
  renderFilterBar();
  // display-area
  document.getElementById('display-area').style.background=T.bg;
  document.getElementById('leaflet-map').style.borderColor=T.gf;
  // panel
  document.getElementById('panel').style.background=T.bg;
  document.getElementById('nosig').style.color=T.gm;
  // settings
  const st=document.getElementById('settings');
  st.style.borderTopColor=T.gf;st.style.background=T.bg;
  st.querySelector('label').style.color=T.gm;
  document.getElementById('rval').style.color=T.g;
  const sl=document.getElementById('rslider');
  sl.style.background=T.gf;
  // CSS per slider thumb (via style tag dinamico)
  let sty=document.getElementById('dynstyle');
  if(!sty){sty=document.createElement('style');sty.id='dynstyle';document.head.appendChild(sty);}
  sty.textContent=`#rslider::-webkit-slider-thumb{background:${T.g};box-shadow:0 0 6px ${T.g};}
  #panel::-webkit-scrollbar-thumb{background:${T.gf};}
  .spinner{border:2px solid ${T.gf};border-top-color:${T.g};}`;
  // loading
  document.getElementById('loading').style.background=T.bg;
  document.getElementById('loading').style.color=T.g;
  document.getElementById('ltxt').style.color=T.g;
  document.getElementById('lver').style.color=T.gm;
  // mappa
  if(map){
    userMapMarker&&(userMapMarker.getElement().querySelector('.user-map-dot').style.background=T.g);
    radiusCircle&&radiusCircle.setStyle({color:T.g});
  }
  if(S.ac.length>0)renderPanel(S.ac[S.selIdx]);
}

function cycleTheme(){
  const idx=(THEME_ORDER.indexOf(T.id)+1)%THEME_ORDER.length;
  applyTheme(THEME_ORDER[idx]);
  document.getElementById('themebtn').textContent=T.label;
}

// ── FILTRI ────────────────────────────────────────────
const FILTERS={wb:true,nb:true,rj:true,biz:true,heli:true,mil:true};
const FILT_LABELS={wb:'WIDE',nb:'NARROW',rj:'REGIONAL',biz:'BIZJET',heli:'HELI',mil:'MILITAR'};

function acCat(t){
  if(!t)return'nb';
  const u=t.toUpperCase();
  if(/^(EC\d|B06|R4[24]|AS3|H6|S76|S92|NH9|R22|AW1|MD9\d)/.test(u))return'heli';
  if(/^(A33|A34|A35|A36|B76|B77|B78|B79|DC10|MD11|A30[BF]|B74|A38)/.test(u))return'wb';
  if(/^(E17|E19|E29|CRJ|AT[457]|AT6|DH8|SF3|F50|F70|F100|B73[0-6]|SH3|JS4|AN2|C21)/.test(u))return'rj';
  if(/^(GL|LJ|PC12|CJ[0-9]|C25|C56|C55|BE4|CL6|E50|DA[45]|SR2|PRM|HA4|PC24|P18|C68|GLF)/.test(u))return'biz';
  if(/^(C17|C13|A400|B52|F1[68]|F35|C5[AB]|P[38]|C27|KC|RC|E[38]|IL7|IL8|AN7|C160)/.test(u))return'mil';
  return'nb';
}

// dimensione blip per categoria e capacità
function blipSize(ac){
  const cat=acCat(ac.t||'');
  const typCode=(ac.t||'').toUpperCase();
  const CAP={A388:555,A359:300,A35K:369,A333:277,A332:253,A346:360,A343:295,B748:467,B744:416,B743:496,B77W:396,B773:368,B788:242,B789:296,B78X:330,B762:218,B763:261,B764:304,B752:200,B753:243,A20N:165,A21N:194,A320:150,A321:180,A319:124,A318:107,B738:162,B739:178,B737:150,B37M:162,B38M:178,B39M:193};
  const pax=CAP[typCode]||0;
  if(cat==='wb'||pax>300)return 9;
  if(cat==='nb'||pax>150)return 6;
  if(cat==='rj'||pax>60)return 4;
  if(cat==='biz')return 3;
  if(cat==='heli')return 5; // diamante
  if(cat==='mil')return 6; // quadrato
  return 5;
}

function renderFilterBar(){
  const fb=document.getElementById('filterbar');
  fb.innerHTML='';
  Object.keys(FILTERS).forEach(k=>{
    const b=document.createElement('button');
    b.className='fbtn';
    b.textContent=FILT_LABELS[k];
    b.onclick=()=>{FILTERS[k]=!FILTERS[k];renderFilterBar();renderPanel(S.ac[S.selIdx]);};
    b.style.fontFamily=T.font;
    b.style.color=FILTERS[k]?T.g:T.gm;
    b.style.borderColor=FILTERS[k]?T.g:T.gf;
    b.style.background=FILTERS[k]?T.g.replace('#','rgba(').replace(')',', .12)').replace('rgba(','rgba('+T.g.slice(1,3)+','+T.g.slice(3,5)+','+T.g.slice(5,7)+',')||'rgba(0,0,0,.02)':'none';
    // semplice evidenziazione
    if(FILTERS[k]){b.style.background=T.g+'1a';}else{b.style.background='none';}
    fb.appendChild(b);
  });
}

function isVisible(ac){return FILTERS[acCat(ac.t||'')||'nb']!==false;}

// ── GEO ───────────────────────────────────────────────

let audioCtx=null,audioOn=false,beepTimer=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function doBeep(){if(!audioCtx||!audioOn)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=1050;o.type='sine';g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.25,audioCtx.currentTime+0.008);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.09);}
function beepMs(dist){if(dist>100)return null;const step=Math.floor(Math.min(100,Math.max(0,dist))/10);return 300+step*270;}
function scheduleBeep(){if(!audioOn)return;const ac=S.ac[S.selIdx];if(!ac||S.lat===null){beepTimer=setTimeout(scheduleBeep,2000);return;}const dist=haversine(S.lat,S.lon,ac.lat||S.lat,ac.lon||S.lon);const iv=beepMs(dist);if(iv===null){beepTimer=setTimeout(scheduleBeep,1500);return;}doBeep();beepTimer=setTimeout(scheduleBeep,iv);}

function shareWhatsapp(){
  const ac=S.ac[S.selIdx];if(!ac)return;
  const hx=S.hexCache[ac.hex]||{};
  const cs=(ac.flight||'').trim()||ac.hex||'—';
  const csKey=cs.replace(/\s/g,'');
  const rt=S.routeCache[csKey]||{};
  const aln=airlineName(cs,hx.op,rt.airline);
  const dist=S.lat?Math.round(haversine(S.lat,S.lon,ac.lat,ac.lon)):null;
  const altFt=ac.alt_baro??ac.alt_geom;
  const spd=ac.gs!=null?Math.round(ac.gs*1.852):null;
  const dep=rt.origin?`${rt.origin.iata||rt.origin.icao}${rt.origin.city?' ('+rt.origin.city+')':''}`:((ac.dep||'').toUpperCase()||'—');
  const arr=rt.dest?`${rt.dest.iata||rt.dest.icao}${rt.dest.city?' ('+rt.dest.city+')':''}`:((ac.arr||'').toUpperCase()||'—');
  const typ=(ac.t||hx.type||'');
  const mfr=hx.mfr||mfrFromCode(typ)||'';
  const lines=[
    `✈ *${cs}*${aln?' — '+aln:''}`,
    dep!=='—'?`🛫 ${dep} → 🛬 ${arr}`:'',
    mfr||typ?`🔧 ${[mfr,typ].filter(Boolean).join(' ')}${hx.reg?' · '+hx.reg:''}`:'',
    hx.year?`📅 Anno: ${hx.year}`:'',
    dist!=null?`📍 Distanza: ${dist} km`:'',
    altFt!=null?`📡 Quota: ${Math.round(altFt).toLocaleString()} ft`:'',
    spd!=null?`💨 Velocità: ${spd} km/h`:'',
    ``,`👉 https://pablobongo.github.io/skyradar`
  ].filter(l=>l!==undefined&&(l===''||l.length>3));
  const text=lines.join('\n');
  window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

function zoomForRadius(km){if(km<=25)return 11;if(km<=40)return 10;if(km<=70)return 9;if(km<=120)return 8;if(km<=200)return 7;return 6;}
function initMap(){
  if(map)return;
  const mapEl=document.getElementById('leaflet-map');
  mapEl.style.width=SZcss+'px';mapEl.style.height=SZcss+'px';
  map=L.map('leaflet-map',{zoomControl:true,attributionControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OSM',maxZoom:18,subdomains:'abc'}).addTo(map);
  if(S.lat!==null)map.setView([S.lat,S.lon],zoomForRadius(S.radius));
}
function updateMapView(){
  if(!map||viewMode!=='map'||S.lat===null)return;
  if(!userMapMarker){const icon=L.divIcon({html:`<div class="user-map-dot" style="background:${T.g};color:${T.g}"></div>`,className:'',iconSize:[12,12],iconAnchor:[6,6]});userMapMarker=L.marker([S.lat,S.lon],{icon,zIndexOffset:1000}).addTo(map);}
  else userMapMarker.setLatLng([S.lat,S.lon]);
  if(radiusCircle)radiusCircle.remove();
  radiusCircle=L.circle([S.lat,S.lon],{radius:S.radius*1000,color:T.g,weight:1.5,opacity:.5,fillColor:T.g,fillOpacity:.04,dashArray:'6,4'}).addTo(map);
  const active=new Set();
  S.ac.forEach((ac,idx)=>{
    if(!ac.lat||!ac.lon||!isVisible(ac))return;
    const dist=haversine(S.lat,S.lon,ac.lat,ac.lon);if(dist>S.radius)return;
    const hex=ac.hex||('_'+idx),sel=idx===S.selIdx;active.add(hex);
    const sz=sel?22:14;
    const icon=L.divIcon({html:`<div class="ac-map-blip${sel?' sel':''}" style="width:${sz}px;height:${sz}px;font-size:${sel?10:8}px;border-color:${T.g};background:${sel?T.g:'rgba(0,0,0,.4)'};color:${sel?'#000':T.g}">${idx+1}</div>`,className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    if(mapMarkers[hex]){mapMarkers[hex].setLatLng([ac.lat,ac.lon]);mapMarkers[hex].setIcon(icon);}
    else{const m=L.marker([ac.lat,ac.lon],{icon}).addTo(map);m.on('click',()=>{S.selIdx=idx;renderPanel(S.ac[idx]);updateMapView();});mapMarkers[hex]=m;}
  });
  Object.keys(mapMarkers).forEach(hex=>{if(!active.has(hex)){mapMarkers[hex].remove();delete mapMarkers[hex];}});
}
function toggleView(){
  const canvas=document.getElementById('rc'),mapEl=document.getElementById('leaflet-map'),btn=document.getElementById('viewbtn');
  if(viewMode==='radar'){viewMode='map';canvas.style.display='none';mapEl.style.display='block';mapEl.style.width=SZcss+'px';mapEl.style.height=SZcss+'px';btn.textContent='RADAR';initMap();setTimeout(()=>{if(map){map.invalidateSize();if(S.lat!==null)map.setView([S.lat,S.lon],zoomForRadius(S.radius));updateMapView();}},150);}
  else{viewMode='radar';mapEl.style.display='none';canvas.style.display='block';btn.textContent='MAPPA';}
}

function hex2rgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}

function drawRadar(){

function onTap(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();let cx,cy;
  if(e.touches){cx=e.touches[0].clientX-rect.left;cy=e.touches[0].clientY-rect.top;}
  else{cx=e.clientX-rect.left;cy=e.clientY-rect.top;}
  let best=null,bestD=34;
  S.blips.forEach(b=>{const d=Math.hypot(b.x-cx,b.y-cy);if(d<bestD){bestD=d;best=b;}});
  if(best){S.selIdx=best.idx;renderPanel(S.ac[S.selIdx]);}
}
canvas.addEventListener('click',onTap);

async function fetchAC(){
  if(S.lat===null)return;
  const nm=Math.max(11,Math.ceil(S.radius/1.852));
  try{
    const r=await fetch(`https://api.airplanes.live/v2/point/${S.lat}/${S.lon}/${nm}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return;
    const data=await r.json();
    let ac=(data.ac||[]).filter(a=>a.lat&&a.lon);
    ac.sort((a,b)=>haversine(S.lat,S.lon,a.lat,a.lon)-haversine(S.lat,S.lon,b.lat,b.lon));
    S.ac=ac;S.lastUpd=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if(S.selIdx>=ac.length)S.selIdx=0;
    const vis=ac.filter(isVisible);
    document.getElementById('hcount').textContent=vis.length+' IN ZONA';
    if(vis.length===0){document.getElementById('nosig').style.display='';document.getElementById('finfo').style.display='none';}
    else{document.getElementById('nosig').style.display='none';document.getElementById('finfo').style.display='';renderPanel(ac[S.selIdx]);ac.slice(0,10).forEach(a=>{if(a.hex)fetchHex(a.hex);const cs=(a.flight||'').trim().replace(/\s/g,'');if(cs)fetchRoute(cs);});}
    if(viewMode==='map')updateMapView();
  }catch(e){console.warn('fetchAC:',e.message);}
}

}
async function fetchRoute(callsign){
  if(S.routeCache[callsign]!==undefined)return;
  S.routeCache[callsign]=null;
  try{
    const url='https://api.adsbdb.com/v0/callsign/'+callsign;
    const r=await fetch(url,{signal:AbortSignal.timeout(6000)});
    if(!r.ok)return;
    const data=await r.json();
    const fr=data&&data.response&&data.response.flightroute;
    if(!fr)return;
    const orig=fr.origin,dest=fr.destination;
    if(!orig||!dest)return;
    // Validazione geografica con coordinate aeroporti

    if(orig.latitude&&dest.latitude&&S.lat!==null){
      const oLat=+orig.latitude,oLon=+orig.longitude;
      const dLat=+dest.latitude,dLon=+dest.longitude;
      const ac=S.ac.find(function(a){return a.flight&&(a.flight.trim().replace(/\s/g,'')).toUpperCase()===callsign;});
      if(ac){
        const dOD=haversine(oLat,oLon,dLat,dLon);
        const dOA=haversine(oLat,oLon,ac.lat,ac.lon);
        const dDA=haversine(dLat,dLon,ac.lat,ac.lon);
        valid=dOD>50&&(dOA+dDA)<(dOD*2.5);
      }
    }
    if(!valid){S.routeCache[callsign]={};return;}
    S.routeCache[callsign]={
      airline:fr.airline&&fr.airline.name||null,
      origin:orig?{
        icao:orig.icao_code,iata:orig.iata_code,
        city:orig.municipality,name:orig.name,country:orig.country_iso_name,
        lat:orig.latitude||null,lon:orig.longitude||null

      dest:dest?{

        lat:dest.latitude||null,lon:dest.longitude||null

    };
    const sel=S.ac[S.selIdx];
    const selCs=(sel&&sel.flight||'').trim().replace(/\s/g,'');

}

function acCat(t){

  if(/^(EC\d|B06|R4[24]|AS3|H6|S76|S92|NH9|R22|AW1|MD9\d)/.test(u))return'heli';
  if(/^(A33|A34|A35|A36|B76|B77|B78|B79|DC10|MD11|A30[BF]|B74|A38)/.test(u))return'wb';

function blipSize(ac){

  const csKey=cs.replace(/\s/g,'');
  const rt=S.routeCache[csKey]||{};
  const aln=airlineName(cs,hx.op,rt.airline);
  const dist=S.lat?Math.round(haversine(S.lat,S.lon,ac.lat,ac.lon)):null;
  const altFt=ac.alt_baro??ac.alt_geom;
  const spd=ac.gs!=null?Math.round(ac.gs*1.852):null;
  const dep=rt.origin?`${rt.origin.iata||rt.origin.icao}${rt.origin.city?' ('+rt.origin.city+')':''}`:((ac.dep||'').toUpperCase()||'—');
  const arr=rt.dest?`${rt.dest.iata||rt.dest.icao}${rt.dest.city?' ('+rt.dest.city+')':''}`:((ac.arr||'').toUpperCase()||'—');
  const typ=(ac.t||hx.type||'');
  const mfr=hx.mfr||mfrFromCode(typ)||'';
  const lines=[
    `✈ *${cs}*${aln?' — '+aln:''}`,
    dep!=='—'?`🛫 ${dep} → 🛬 ${arr}`:'',
    mfr||typ?`🔧 ${[mfr,typ].filter(Boolean).join(' ')}${hx.reg?' · '+hx.reg:''}`:'',
    hx.year?`📅 Anno: ${hx.year}`:'',
    dist!=null?`📍 Distanza: ${dist} km`:'',

    ``,`👉 https://pablobongo.github.io/skyradar`

  const text=lines.join('\n');
  window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

let rafId=null,CX,CY,RPX;

function setupCanvas(){

function hex2rgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}

function drawRadar(){
  const SZ=SZcss,c=T.g,{r,g,b}=hex2rgb(T.g);
  const ga=`rgba(${r},${g},${b},`;
  ctx.clearRect(0,0,SZ,SZ);
  const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,RPX);
  bg.addColorStop(0,T.rb1);bg.addColorStop(0.6,T.rb2);bg.addColorStop(1,T.rb3);
  ctx.beginPath();ctx.arc(CX,CY,RPX,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  [.25,.5,.75,1].forEach((f,i)=>{
    ctx.beginPath();ctx.arc(CX,CY,RPX*f,0,Math.PI*2);
    ctx.strokeStyle=`${ga}${i===3?.35:.12})`;ctx.lineWidth=i===3?1.5:1;ctx.stroke();
    if(i<3){const d=Math.round(S.radius*f),fs=Math.max(9,SZ/46),ang=-Math.PI/4;ctx.fillStyle=`${ga}.4)`;ctx.font=`bold ${fs}px 'Courier New'`;ctx.textAlign='left';ctx.fillText(d+'km',CX+RPX*f*Math.cos(ang)+1,CY+RPX*f*Math.sin(ang)-2);}
  });
  ctx.strokeStyle=`${ga}.1)`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(CX,CY-RPX);ctx.lineTo(CX,CY+RPX);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CX-RPX,CY);ctx.lineTo(CX+RPX,CY);ctx.stroke();
  const fc=Math.max(11,SZ/30);
  ctx.fillStyle=`${ga}.6)`;ctx.font=`bold ${fc}px 'Courier New'`;
  ctx.textAlign='center';ctx.fillText('N',CX,CY-RPX+fc+1);ctx.fillText('S',CX,CY+RPX-3);
  ctx.textAlign='left';ctx.fillText('E',CX+RPX-fc-2,CY+5);ctx.fillText('O',CX-RPX+4,CY+5);
  ctx.save();ctx.translate(CX,CY);ctx.rotate(S.sweep);
  for(let i=10;i>=0;i--){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,RPX,0,-0.55*i/10,false);ctx.closePath();ctx.fillStyle=`${ga}${0.004*(10-i)})`;ctx.fill();}

  ctx.beginPath();ctx.arc(RPX,0,3,0,Math.PI*2);ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;

  S.blips=[];

    S.ac.forEach((ac,idx)=>{
      if(!ac.lat||!ac.lon||!isVisible(ac))return;
      const dist=haversine(S.lat,S.lon,ac.lat,ac.lon);
      if(dist>S.radius)return;

function onTap(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();let cx,cy;
  if(e.touches){cx=e.touches[0].clientX-rect.left;cy=e.touches[0].clientY-rect.top;}
  else{cx=e.clientX-rect.left;cy=e.clientY-rect.top;}
  let best=null,bestD=34;
  S.blips.forEach(b=>{const d=Math.hypot(b.x-cx,b.y-cy);if(d<bestD){bestD=d;best=b;}});
  if(best){S.selIdx=best.idx;renderPanel(S.ac[S.selIdx]);}
}

    let ac=(data.ac||[]).filter(a=>a.lat&&a.lon);
